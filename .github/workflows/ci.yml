name: CI

on: [push, pull_request]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v5
              with:
                node-version: 22
                cache: 'npm'
            - run: npm install
            - name: Validation (Lint, Test, Build)
              run: npx turbo run lint test build